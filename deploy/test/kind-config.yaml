# kind cluster config used by deploy/test/kind.sh.
#
# Provisions one control-plane + three workers so the HA / Lease scenarios
# (TestHAFailClosed) have somewhere to schedule 3 Portal replicas with the
# anti-affinity rules the chart installs by default.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: portal-e2e
nodes:
  - role: control-plane
  - role: worker
  - role: worker
  - role: worker
networking:
  apiServerAddress: "127.0.0.1"
