apiVersion: v1
kind: Namespace
metadata:
  name: portal-e2e
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-receiver
  namespace: portal-e2e
  labels:
    app: alertmanager-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-receiver
  template:
    metadata:
      labels:
        app: alertmanager-receiver
    spec:
      containers:
        - name: receiver
          image: alertmanager-receiver:e2e
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 9093
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-receiver
  namespace: portal-e2e
spec:
  selector:
    app: alertmanager-receiver
  ports:
    - name: http
      port: 9093
      targetPort: http
