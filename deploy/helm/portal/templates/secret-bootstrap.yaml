{{- if not .Values.certManager.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "portal.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    # Keep the Secret across upgrades/uninstalls so Portal's bootstrapped
    # self-signed CA survives chart churn — re-rolling the cert means
    # patching the ValidatingWebhookConfiguration.caBundle again.
    "helm.sh/resource-policy": keep
type: kubernetes.io/tls
data:
  # Portal populates these at startup. Empty placeholders so the Secret
  # exists for the Deployment's volume mount; the container tolerates
  # missing/empty cert files via --cert-dir auto-generation.
  tls.crt: ""
  tls.key: ""
{{- end }}
