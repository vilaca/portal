{{- if not .Values.certManager.enabled -}}
# Bootstrap placeholder Secret. init-certs writes the real material into this
# Secret at Pod start (kubernetes.io/tls type, three data keys). The Opaque
# placeholder here exists so the helm.sh/resource-policy: keep annotation
# survives uninstall — that way reinstall reuses the same CA + leaf if
# they're still in the renewal window, and the ValidatingWebhookConfiguration
# does not flap.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "portal.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
{{- end }}
