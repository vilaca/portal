apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: portalclusterrules.portal.io
spec:
  group: portal.io
  scope: Cluster
  names:
    kind: PortalClusterRule
    listKind: PortalClusterRuleList
    plural: portalclusterrules
    singular: portalclusterrule
    shortNames:
      - pcr
    categories:
      - portal
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Name
          type: string
          jsonPath: .spec.name
        - name: Severity
          type: string
          jsonPath: .spec.severity
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - enabled
                - match
                - rule
              properties:
                name:
                  type: string
                  minLength: 1
                enabled:
                  type: boolean
                severity:
                  type: string
                  enum: [info, low, medium, high, critical]
                mode:
                  type: array
                  items:
                    type: string
                    enum: [admission, audit, runtime]
                enforcementAction:
                  type: string
                  enum: [deny, warn, dryrun]
                match:
                  type: object
                  required:
                    - gvk
                  properties:
                    gvk:
                      type: array
                      items:
                        type: object
                        required:
                          - version
                          - kind
                        properties:
                          group:
                            type: string
                          version:
                            type: string
                          kind:
                            type: string
                    namespaces:
                      type: object
                      properties:
                        include:
                          type: array
                          items:
                            type: string
                        exclude:
                          type: array
                          items:
                            type: string
                rule:
                  type: string
                  minLength: 1
                alert:
                  type: string
                actions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                      on:
                        type: array
                        items:
                          type: string
                      rateLimit:
                        type: string
                      params:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                evalCount:
                  type: integer
                  format: int64
                violationCount:
                  type: integer
                  format: int64
                lastApplied:
                  type: string
                  format: date-time
                parseError:
                  type: string
                activeOn:
                  type: array
                  items:
                    type: string
