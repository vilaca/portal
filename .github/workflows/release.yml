name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build CLI binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build portal binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o "dist/portal-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/portal

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: portal-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/portal-${{ matrix.goos }}-${{ matrix.goarch }}

  build-image:
    name: Build & push container image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pushes to ghcr.io/vilaca/portal via the workflow's GITHUB_TOKEN.
      # The repo's "Packages" settings must mark the package public on first
      # publish. See docs/contributing/release-process.md.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/vilaca/portal:${{ steps.ver.outputs.version }}
            ghcr.io/vilaca/portal:latest
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}

  package-chart:
    name: Package Helm chart
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/portal \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination dist/

      # Publish chart as an OCI artifact so operators can `helm install
      # oci://ghcr.io/vilaca/charts/portal --version <tag>` directly.
      - name: Log in to GHCR (chart)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          helm push dist/portal-*.tgz oci://ghcr.io/vilaca/charts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/portal-*.tgz

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-image, package-chart]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -type f \( -name "portal-*" -o -name "*.tgz" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
