name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: Lint & link-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Markdown link check (docs/)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --max-concurrency 8 'docs/**/*.md' 'README.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs-generation-drift:
    name: Generated-doc drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.17.3

      - name: Install helm-docs
        # `go install` matches the Makefile's `tools` target — keeps CI and
        # local output byte-identical. The pre-built release tarball ships
        # with a different template that adds a footer the `go install`
        # build doesn't emit; using the same install method here means the
        # drift check doesn't flag binary-build differences as real drift.
        run: go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.13.1

      - name: Run docs generators
        run: make generate-docs

      - name: Fail if generated docs drifted
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated documentation is out of date. Run 'make generate-docs' locally and commit the result."
            git status --short
            git --no-pager diff
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # End-to-end suite against a disposable kind cluster.
  # Runs on PRs targeting main and on pushes to main. Doc-only PRs skip via
  # the paths-filter step; the job is fail-on-error (no continue-on-error).
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect doc-only change
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '!docs/**'
              - '!**/*.md'
              - '!mkdocs.yml'

      - name: Set up Go
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install Helm
        if: steps.filter.outputs.code == 'true'
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install kind
        if: steps.filter.outputs.code == 'true'
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.23.0

      - name: Verify shell scripts
        if: steps.filter.outputs.code == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck deploy/test/*.sh

      - name: Run e2e
        if: steps.filter.outputs.code == 'true'
        run: ./deploy/test/kind.sh

      - name: Upload kind logs on failure
        if: failure() && steps.filter.outputs.code == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: deploy/test/kind-logs
          if-no-files-found: ignore
