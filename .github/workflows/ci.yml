name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: Lint & link-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Markdown link check (docs/)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --max-concurrency 8 'docs/**/*.md' 'README.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs-generation-drift:
    name: Generated-doc drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest

      - name: Install helm-docs
        run: |
          HELM_DOCS_VERSION=1.13.1
          curl -fsSL -o /tmp/helm-docs.tgz \
            "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz"
          mkdir -p /tmp/helm-docs
          tar -xzf /tmp/helm-docs.tgz -C /tmp/helm-docs
          sudo install /tmp/helm-docs/helm-docs /usr/local/bin/helm-docs

      - name: Run docs generators
        run: make generate-docs

      - name: Fail if generated docs drifted
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated documentation is out of date. Run 'make generate-docs' locally and commit the result."
            git status --short
            git --no-pager diff
            exit 1
          fi
