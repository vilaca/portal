# Rule: warn when a pod uses the default ServiceAccount with automount on.
# Pods that don't need the API surface should opt out of token mounting.
name: service-account-automount
enabled: true
severity: medium
mode: [audit]
enforcementAction: warn
match:
  gvk:
    - {group: "", version: v1, kind: Pod}
rule: >
  spec.serviceAccountName == "default"
  && spec.automountServiceAccountToken != false
alert: insecure-workload
